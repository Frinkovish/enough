name: Daily Telegram reminder

on:
  # Actual scheduling is done by an external service (cron-job.org) hitting
  # the backend directly — GitHub Actions' own `schedule:` trigger is not
  # reliable for time-sensitive jobs (documented, well-known limitation:
  # https://github.com/upptime/upptime/issues/24). This workflow is kept
  # only as a manual "run it now" button for testing.
  workflow_dispatch: {}

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend reminder endpoint
        run: |
          curl -fsS --max-time 60 --retry 2 --retry-delay 10 \
            -X POST "${{ secrets.REMINDER_BACKEND_URL }}/api/v1/reminders/daily" \
            -H "X-Reminder-Secret: ${{ secrets.REMINDER_SECRET }}"
