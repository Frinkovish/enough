name: enough
description: Enough — a calm, 20-minute delay app for cravings.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  # Pinned below 2.15.0: that version added a direct, non-optional
  # dependency on `passkeys`, whose web plugin requires a third-party
  # JS bundle in index.html we don't want to pull in for a feature
  # (WebAuthn/passkeys) this app doesn't use.
  supabase_flutter: ">=2.8.0 <2.15.0"
  flutter_dotenv: ^5.2.1
  uuid: ^4.5.1
  http: ^1.2.2
  fl_chart: ^0.69.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
